<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健康知識 RPG - 完整版</title>
    <style>
        body {
            background-color: #222;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #game-container {
            width: 800px;
            height: 500px;
            background-color: #333;
            border: 4px solid #fff;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        #status-bar {
            padding: 10px;
            background-color: #111;
            border-bottom: 2px solid #fff;
            display: flex;
            justify-content: space-between;
            font-size: 20px;
            z-index: 30;
        }
        .status-group {
            display: flex;
            gap: 15px;
        }
        #scene {
            flex-grow: 1;
            position: relative;
            background-color: #4a6984;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255,255,255,0.2) 20px, transparent 21px),
                radial-gradient(circle at 70% 40%, rgba(255,255,255,0.15) 30px, transparent 31px);
            background-size: 300px 100%;
        }
        #ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 25%;
            background-image: repeating-linear-gradient(90deg, #5c4033, #5c4033 40px, #4a3329 40px, #4a3329 80px);
            border-top: 4px solid #3b2818;
        }
        .entity {
            position: absolute;
            bottom: 25%;
            font-size: 60px;
            user-select: none;
        }
        #player {
            left: 50px;
            z-index: 10;
            transition: transform 0.1s;
        }
        #encounter-entity {
            right: 150px;
            display: none;
            z-index: 5;
        }
        #ui-layer {
            position: absolute;
            top: 50px;
            width: 100%;
            text-align: center;
            pointer-events: none;
            font-weight: bold;
            color: rgba(255,255,255,0.7);
        }
        #dialog-box {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 180px;
            background-color: rgba(0, 0, 0, 0.9);
            border-top: 2px solid #fff;
            padding: 15px;
            box-sizing: border-box;
            display: none;
            flex-direction: column;
            z-index: 40;
        }
        #dialog-text {
            margin: 0 0 15px 0;
            font-size: 18px;
            line-height: 1.4;
        }
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        button.action-btn {
            background-color: #444;
            color: #fff;
            border: 1px solid #fff;
            padding: 10px;
            cursor: pointer;
            font-family: inherit;
            font-size: 16px;
            text-align: center;
        }
        button.action-btn:hover {
            background-color: #666;
        }
        button.option-btn {
            text-align: left;
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 50;
        }
        #overlay h1 {
            font-size: 40px;
            margin-bottom: 20px;
        }
        #start-btn {
            padding: 10px 20px;
            font-size: 20px;
            background-color: #fff;
            color: #000;
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
        }
        #start-btn:hover {
            background-color: #ddd;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="status-bar">
        <div class="status-group">
            <span id="hp-display">HP: ❤️❤️❤️</span>
            <span id="equip-display">裝備: 無</span>
        </div>
        <span id="progress-display">進度: 0%</span>
    </div>
    
    <div id="scene">
        <div id="ground"></div>
        <div id="ui-layer">請使用鍵盤 [←] [→] 移動</div>
        <div id="player" class="entity">🧑‍⚕️</div>
        <div id="encounter-entity" class="entity"></div>
    </div>
    
    <div id="dialog-box">
        <p id="dialog-text">載入中...</p>
        <div class="options-grid" id="options-container"></div>
    </div>

    <div id="overlay">
        <h1 id="overlay-title">健康知識 RPG</h1>
        <button id="start-btn">開始遊戲</button>
    </div>
</div>

<script>
    // 遊戲核心參數
    const maxHP = 3;
    let currentHP = maxHP;
    let hasShield = false; // 護盾狀態
    let currentEventIndex = 0;
    
    // 物理與位移參數
    let gameState = 'title'; // 'title', 'explore', 'dialogue', 'combat', 'gameover'
    let playerX = 50;
    let mapScrollX = 0;
    let speed = 5;
    let distanceToNextEvent = 300;
    
    const keys = { ArrowLeft: false, ArrowRight: false };

    // 事件資料庫 (整合 NPC 與 怪物)
    const mapEvents = [
        {
            type: 'npc',
            sprite: '🧙‍♂️',
            text: '村長：「年輕的醫護人員，前方的病毒非常危險。戴上這個『醫療級口罩』吧，它能為你抵擋一次致命錯誤。」',
            itemLabel: '獲得裝備：醫療級口罩 (抵擋一次傷害)',
            effect: 'shield'
        },
        {
            type: 'monster',
            sprite: '🦠',
            question: '【遭遇 腸病毒】關於正確的洗手方式，下列何者為非？',
            options: ['使用肥皂與清水', '僅用清水沖洗3秒', '搓揉至少20秒', '確實擦乾雙手'],
            correctIndex: 1
        },
        {
            type: 'npc',
            sprite: '👩‍🌾',
            text: '村民：「謝謝你擊退病毒！這顆『營養蘋果』請收下，可以恢復你的體力。」',
            itemLabel: '獲得道具：營養蘋果 (恢復 1 HP)',
            effect: 'heal'
        },
        {
            type: 'monster',
            sprite: '🦇',
            question: '【遭遇 疲勞蝙蝠】依據醫學建議，一般成年人每日理想的睡眠時間約為多少？',
            options: ['4至5小時', '10至12小時', '7至9小時', '少於4小時'],
            correctIndex: 2
        },
        {
            type: 'monster',
            sprite: '🦟',
            question: '【遭遇 登革熱蚊】預防登革熱最核心且有效的環境管理措施為？',
            options: ['清除室內外積水容器', '大量噴灑化學殺蟲劑', '全天候緊閉門窗', '常規服用抗生素'],
            correctIndex: 0
        }
    ];

    // DOM 元素選取
    const hpDisplay = document.getElementById('hp-display');
    const equipDisplay = document.getElementById('equip-display');
    const progressDisplay = document.getElementById('progress-display');
    const sceneEl = document.getElementById('scene');
    const groundEl = document.getElementById('ground');
    const playerEl = document.getElementById('player');
    const encounterEl = document.getElementById('encounter-entity');
    const dialogBox = document.getElementById('dialog-box');
    const dialogText = document.getElementById('dialog-text');
    const optionsContainer = document.getElementById('options-container');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlay-title');
    const startBtn = document.getElementById('start-btn');

    // 監聽鍵盤事件
    window.addEventListener('keydown', (e) => {
        if (keys.hasOwnProperty(e.code)) keys[e.code] = true;
    });
    window.addEventListener('keyup', (e) => {
        if (keys.hasOwnProperty(e.code)) keys[e.code] = false;
    });

    function initGame() {
        currentHP = maxHP;
        hasShield = false;
        currentEventIndex = 0;
        playerX = 50;
        mapScrollX = 0;
        distanceToNextEvent = 300;
        gameState = 'explore';
        
        updateStatus();
        overlay.style.display = 'none';
        dialogBox.style.display = 'none';
        encounterEl.style.display = 'none';
        
        keys.ArrowLeft = false;
        keys.ArrowRight = false;
        
        requestAnimationFrame(gameLoop);
    }

    function updateStatus() {
        hpDisplay.innerText = 'HP: ' + '❤️'.repeat(currentHP) + '🖤'.repeat(maxHP - currentHP);
        equipDisplay.innerText = hasShield ? '裝備: 🛡️口罩' : '裝備: 無';
        
        const progress = Math.floor((currentEventIndex / mapEvents.length) * 100);
        progressDisplay.innerText = `進度: ${progress}%`;
    }

    function gameLoop() {
        if (gameState === 'explore') {
            handleMovement();
            updateVisuals();
            checkEvent();
        }
        
        if (gameState !== 'gameover' && gameState !== 'title') {
            requestAnimationFrame(gameLoop);
        }
    }

    function handleMovement() {
        if (keys.ArrowRight) {
            playerEl.style.transform = 'scaleX(1)';
            if (playerX < 350) {
                playerX += speed;
            } else {
                mapScrollX -= speed;
                distanceToNextEvent -= speed;
            }
        }
        
        if (keys.ArrowLeft) {
            playerEl.style.transform = 'scaleX(-1)';
            if (playerX > 10) {
                playerX -= speed;
            } else if (mapScrollX < 0) {
                mapScrollX += speed;
                distanceToNextEvent += speed;
            }
        }
    }

    function updateVisuals() {
        playerEl.style.left = playerX + 'px';
        sceneEl.style.backgroundPositionX = (mapScrollX * 0.3) + 'px';
        groundEl.style.backgroundPositionX = mapScrollX + 'px';
    }

    function checkEvent() {
        if (distanceToNextEvent <= 0 && currentEventIndex < mapEvents.length) {
            triggerEvent();
        } else if (currentEventIndex >= mapEvents.length) {
            endGame(true);
        }
    }

    function triggerEvent() {
        const currentData = mapEvents[currentEventIndex];
        encounterEl.innerText = currentData.sprite;
        encounterEl.style.display = 'block';
        encounterEl.style.opacity = '1';
        
        keys.ArrowLeft = false;
        keys.ArrowRight = false;

        setTimeout(() => {
            dialogBox.style.display = 'flex';
            optionsContainer.innerHTML = '';

            if (currentData.type === 'npc') {
                gameState = 'dialogue';
                dialogText.innerText = currentData.text;
                
                const btn = document.createElement('button');
                btn.className = 'action-btn';
                btn.innerText = currentData.itemLabel;
                btn.style.gridColumn = '1 / -1'; // 讓按鈕佔據整列
                btn.onclick = () => applyItemEffect(currentData.effect);
                optionsContainer.appendChild(btn);

            } else if (currentData.type === 'monster') {
                gameState = 'combat';
                dialogText.innerText = currentData.question;

                currentData.options.forEach((opt, index) => {
                    const btn = document.createElement('button');
                    btn.className = 'action-btn option-btn';
                    btn.innerText = `${String.fromCharCode(65 + index)}. ${opt}`;
                    btn.onclick = () => handleAnswer(index, currentData.correctIndex);
                    optionsContainer.appendChild(btn);
                });
            }
        }, 300);
    }

    // 處理 NPC 道具效果
    function applyItemEffect(effect) {
        if (effect === 'shield') {
            hasShield = true;
        } else if (effect === 'heal') {
            if (currentHP < maxHP) currentHP++;
        }
        
        updateStatus();
        resolveEvent();
    }

    // 處理怪物答題邏輯
    function handleAnswer(selectedIndex, correctIndex) {
        if (selectedIndex === correctIndex) {
            resolveEvent();
        } else {
            // 答錯邏輯
            if (hasShield) {
                hasShield = false;
                dialogText.innerText = '答錯了！但你的「醫療級口罩」抵擋了這次傷害，裝備已損毀。請再試一次。';
                updateStatus();
            } else {
                currentHP--;
                updateStatus();
                playerHitAnimation();
                
                if (currentHP <= 0) {
                    endGame(false);
                } else {
                    dialogText.innerText = '答錯了！遭受攻擊扣除 1 HP。請再試一次。';
                }
            }
        }
    }

    // 事件完成（擊敗怪物或領取道具）的共同收尾邏輯
    function resolveEvent() {
        currentEventIndex++;
        updateStatus();
        dialogBox.style.display = 'none';
        
        encounterEl.style.transition = 'opacity 0.5s';
        encounterEl.style.opacity = '0';
        
        setTimeout(() => {
            encounterEl.style.display = 'none';
            encounterEl.style.transition = '';
            distanceToNextEvent = Math.floor(Math.random() * 200) + 300;
            gameState = 'explore';
        }, 500);
    }

    function playerHitAnimation() {
        playerEl.style.transform = `${playerEl.style.transform.includes('-1') ? 'scaleX(-1)' : 'scaleX(1)'} translateX(-20px)`;
        playerEl.style.color = 'red';
        setTimeout(() => {
            playerEl.style.transform = playerEl.style.transform.replace(' translateX(-20px)', '');
            playerEl.style.color = 'inherit';
        }, 200);
    }

    function endGame(isVictory) {
        gameState = 'gameover';
        dialogBox.style.display = 'none';
        overlay.style.display = 'flex';
        updateStatus();
        
        if (isVictory) {
            overlayTitle.innerText = '探險成功，抵達終點！';
            overlayTitle.style.color = '#4CAF50';
            startBtn.innerText = '重新開始';
        } else {
            overlayTitle.innerText = 'HP 歸零，探險失敗';
            overlayTitle.style.color = '#F44336';
            startBtn.innerText = '重新挑戰';
        }
    }

    startBtn.onclick = initGame;

</script>
</body>
</html>
