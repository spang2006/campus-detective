<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>健康電子雞</title>
<style>
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #e0e0e0;
        font-family: monospace;
        margin: 0;
    }
    #device {
        background-color: #d84343;
        padding: 25px;
        border-radius: 40px;
        box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        width: 320px;
        text-align: center;
    }
    #screen {
        background-color: #879e86;
        border: 4px solid #222;
        border-radius: 10px;
        height: 220px;
        margin-bottom: 25px;
        position: relative;
        display: flex;
        flex-direction: column;
        padding: 10px;
        box-sizing: border-box;
        color: #111;
        box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
    }
    .stats {
        display: flex;
        justify-content: space-between;
        font-size: 14px;
        margin-bottom: 10px;
        font-weight: bold;
    }
    #pet {
        font-size: 50px;
        flex-grow: 1;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    #message-box {
        font-size: 13px;
        min-height: 45px;
        background: rgba(255, 255, 255, 0.4);
        border-radius: 5px;
        padding: 6px;
        text-align: left;
        line-height: 1.4;
    }
    .buttons {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-around;
        gap: 10px;
    }
    button {
        background-color: #222;
        color: white;
        border: none;
        padding: 10px;
        border-radius: 50%;
        width: 65px;
        height: 65px;
        cursor: pointer;
        font-size: 14px;
        font-weight: bold;
        box-shadow: 0 4px 0 #000;
        transition: transform 0.1s, box-shadow 0.1s;
    }
    button:active {
        transform: translateY(4px);
        box-shadow: 0 0 0 #000;
    }
    button:disabled {
        background-color: #666;
        box-shadow: none;
        transform: none;
        cursor: not-allowed;
    }
</style>
</head>
<body>

<div id="device">
    <div id="screen">
        <div class="stats">
            <span>飽食: <span id="val-hunger">50</span></span>
            <span>健康: <span id="val-health">80</span></span>
            <span>心情: <span id="val-happiness">80</span></span>
        </div>
        <div id="pet">( • ω • )</div>
        <div id="message-box">系統初始化完成，請開始操作。</div>
    </div>
    <div class="buttons">
        <button id="btn-feed" onclick="action('feed')">飲食</button>
        <button id="btn-water" onclick="action('water')">喝水</button>
        <button id="btn-exercise" onclick="action('exercise')">運動</button>
        <button id="btn-sleep" onclick="action('sleep')">睡眠</button>
    </div>
</div>

<script>
    // 狀態變數初始化
    let stats = {
        hunger: 50,
        health: 80,
        happiness: 80
    };

    let isAlive = true;

    // DOM 元素參考
    const elHunger = document.getElementById('val-hunger');
    const elHealth = document.getElementById('val-health');
    const elHappiness = document.getElementById('val-happiness');
    const elPet = document.getElementById('pet');
    const elMessage = document.getElementById('message-box');
    const buttons = document.querySelectorAll('button');

    // 健康知識資料庫
    const knowledgeBase = {
        feed: [
            "健康知識：國民飲食指南建議，均衡攝取全穀雜糧、豆魚蛋肉、蔬菜、水果、乳品及堅果種子六大類食物。",
            "健康知識：每餐蔬菜攝取量應大於或等於水果量，以維持穩定的血糖波動。"
        ],
        water: [
            "健康知識：一般成人每日建議飲水量約為體重(公斤)乘以 30 毫升。",
            "健康知識：口渴是身體缺水的落後指標，應養成定時定量補充水分的習慣。"
        ],
        exercise: [
            "健康知識：世界衛生組織建議，18至64歲成人每週應至少進行 150 分鐘中等強度有氧運動。",
            "健康知識：規律運動有助於釋放腦內啡，降低罹患心血管疾病的風險並提升睡眠品質。"
        ],
        sleep: [
            "健康知識：多數成年人每日建議睡眠時間為 7 至 9 小時。",
            "健康知識：深度睡眠期為人體組織修復、免疫系統運作與記憶力鞏固的關鍵階段。"
        ],
        idle: [
            "健康提示：久坐超過一小時應起身活動，降低代謝症候群風險。",
            "健康提示：長期處於壓力狀態將導致皮質醇分泌異常，影響免疫力。"
        ]
    };

    // 互動行為對數值的影響權重
    const actionEffects = {
        feed: { hunger: 30, health: 5, happiness: 5 },
        water: { hunger: 5, health: 15, happiness: 5 },
        exercise: { hunger: -20, health: 20, happiness: 15 },
        sleep: { hunger: -10, health: 25, happiness: 10 }
    };

    // 更新畫面渲染
    function updateUI() {
        elHunger.innerText = stats.hunger;
        elHealth.innerText = stats.health;
        elHappiness.innerText = stats.happiness;

        if (!isAlive) return;

        if (stats.health <= 0 || stats.hunger <= 0) {
            triggerDeath();
        } else if (stats.health < 30 || stats.hunger < 30) {
            elPet.innerText = "(;´Д`)";
        } else {
            elPet.innerText = "( • ω • )";
        }
    }

    // 死亡狀態處理
    function triggerDeath() {
        isAlive = false;
        elPet.innerText = "(x _ x)";
        elMessage.innerText = "系統提示：生命徵象消失。數值已歸零，請重新載入網頁。";
        buttons.forEach(btn => btn.disabled = true);
    }

    // 顯示隨機知識訊息
    function displayMessage(type) {
        const messages = knowledgeBase[type];
        const randomIndex = Math.floor(Math.random() * messages.length);
        elMessage.innerText = messages[randomIndex];
    }

    // 執行互動行為
    window.action = function(type) {
        if (!isAlive) return;

        const effect = actionEffects[type];
        
        stats.hunger = Math.min(100, Math.max(0, stats.hunger + effect.hunger));
        stats.health = Math.min(100, Math.max(0, stats.health + effect.health));
        stats.happiness = Math.min(100, Math.max(0, stats.happiness + effect.happiness));
        
        displayMessage(type);
        updateUI();
    };

    // 背景時間循環：數值隨時間自然衰減
    setInterval(() => {
        if (!isAlive) return;

        stats.hunger = Math.max(0, stats.hunger - 2);
        stats.health = Math.max(0, stats.health - 1);
        stats.happiness = Math.max(0, stats.happiness - 2);

        // 有 20% 機率在閒置時跳出健康提示
        if (Math.random() < 0.2) {
            displayMessage('idle');
        }

        updateUI();
    }, 5000); // 設定為每 5 秒執行一次

    // 初始渲染
    updateUI();
</script>
</body>
</html>
