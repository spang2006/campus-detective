<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>健康大富翁 - 模擬AI對戰</title>
<style>
    body {
        font-family: "Courier New", Courier, monospace;
        background-color: #f4f4f9;
        display: flex;
        justify-content: center;
        padding: 20px;
        margin: 0;
        color: #333;
    }
    #game-container {
        width: 800px;
        display: flex;
        gap: 20px;
    }
    #board {
        display: flex;
        flex-wrap: wrap;
        width: 500px;
        gap: 5px;
    }
    .space {
        width: 110px;
        height: 110px;
        background-color: #fff;
        border: 2px solid #ccc;
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 5px;
        box-sizing: border-box;
        font-size: 13px;
        font-weight: bold;
        text-align: center;
        position: relative;
    }
    .space-name { font-size: 14px; margin-bottom: 2px; }
    .space-price { color: #d32f2f; }
    .space-owner { color: #1976d2; font-size: 11px; }
    .players-here {
        display: flex;
        flex-wrap: wrap;
        gap: 2px;
        justify-content: center;
        margin-top: 5px;
    }
    .token {
        width: 15px;
        height: 15px;
        border-radius: 50%;
        color: white;
        font-size: 10px;
        line-height: 15px;
        text-align: center;
    }
    #panel {
        width: 280px;
        background-color: #fff;
        border: 2px solid #ccc;
        border-radius: 8px;
        padding: 15px;
        display: flex;
        flex-direction: column;
        box-sizing: border-box;
    }
    .player-stats {
        margin-bottom: 10px;
        padding: 8px;
        border: 1px solid #eee;
        border-radius: 5px;
        background-color: #fafafa;
    }
    .active-player {
        border-color: #4caf50;
        background-color: #e8f5e9;
    }
    #log {
        flex-grow: 1;
        background-color: #222;
        color: #0f0;
        padding: 10px;
        font-size: 12px;
        overflow-y: auto;
        border-radius: 5px;
        height: 200px;
        margin-top: 15px;
        margin-bottom: 15px;
    }
    button {
        padding: 12px;
        font-size: 16px;
        font-weight: bold;
        background-color: #1976d2;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }
    button:disabled {
        background-color: #999;
        cursor: not-allowed;
    }
</style>
</head>
<body>

<div id="game-container">
    <div id="board"></div>

    <div id="panel">
        <div id="player-list"></div>
        <div id="log">系統：遊戲初始化完成。</div>
        <button id="btn-roll" onclick="humanRoll()" disabled>輪到你擲骰子</button>
    </div>
</div>

<script>
    // 1. 地圖資料定義
    const mapData = [
        { id: 0, name: "起點", type: "start", info: "經過領 $200" },
        { id: 1, name: "健身中心", type: "property", price: 100, rent: 20, owner: null },
        { id: 2, name: "健康抽籤", type: "chance", info: "隨機事件" },
        { id: 3, name: "有機超市", type: "property", price: 150, rent: 30, owner: null },
        { id: 4, name: "急診室", type: "tax", info: "付費 $50", cost: 50 },
        { id: 5, name: "睡眠中心", type: "property", price: 200, rent: 40, owner: null },
        { id: 6, name: "健康抽籤", type: "chance", info: "隨機事件" },
        { id: 7, name: "連鎖藥局", type: "property", price: 100, rent: 20, owner: null },
        { id: 8, name: "復健科", type: "jail", info: "暫停一回合" },
        { id: 9, name: "諮商所", type: "property", price: 150, rent: 30, owner: null },
        { id: 10, name: "健康抽籤", type: "chance", info: "隨機事件" },
        { id: 11, name: "體育館", type: "property", price: 200, rent: 40, owner: null }
    ];

    // 2. 玩家資料定義
    const players = [
        { id: 0, name: "真人玩家", isBot: false, money: 1000, pos: 0, color: "#e53935", sleep: 0 },
        { id: 1, name: "電腦 A", isBot: true, money: 1000, pos: 0, color: "#1e88e5", sleep: 0 },
        { id: 2, name: "電腦 B", isBot: true, money: 1000, pos: 0, color: "#43a047", sleep: 0 },
        { id: 3, name: "電腦 C", isBot: true, money: 1000, pos: 0, color: "#fb8c00", sleep: 0 }
    ];

    let turnIndex = 0;
    const elBoard = document.getElementById('board');
    const elPlayerList = document.getElementById('player-list');
    const elLog = document.getElementById('log');
    const btnRoll = document.getElementById('btn-roll');

    // 系統日誌輸出
    function log(msg) {
        elLog.innerHTML += `<div>${msg}</div>`;
        elLog.scrollTop = elLog.scrollHeight;
    }

    // 繪製地圖與玩家位置
    function renderBoard() {
        elBoard.innerHTML = '';
        mapData.forEach((space, index) => {
            const div = document.createElement('div');
            div.className = 'space';
            let html = `<div class="space-name">${space.name}</div>`;
            
            if (space.type === 'property') {
                html += `<div class="space-price">$${space.price}</div>`;
                if (space.owner !== null) {
                    html += `<div class="space-owner">擁有者: ${players[space.owner].name}</div>`;
                } else {
                    html += `<div class="space-owner">無人擁有</div>`;
                }
            } else {
                html += `<div class="space-owner">${space.info}</div>`;
            }

            // 標示該格位上的玩家
            let playersHtml = '<div class="players-here">';
            players.forEach(p => {
                if (p.pos === index) {
                    playersHtml += `<div class="token" style="background-color:${p.color}">${p.id+1}</div>`;
                }
            });
            playersHtml += '</div>';

            div.innerHTML = html + playersHtml;
            elBoard.appendChild(div);
        });
    }

    // 更新右側玩家數值
    function renderPlayers() {
        elPlayerList.innerHTML = '';
        players.forEach((p, index) => {
            const div = document.createElement('div');
            div.className = `player-stats ${index === turnIndex ? 'active-player' : ''}`;
            div.innerHTML = `
                <strong><span style="color:${p.color}">■</span> ${p.name}</strong> 
                <br>資金: $${p.money} 
                ${p.sleep > 0 ? '(復健中)' : ''}
            `;
            elPlayerList.appendChild(div);
        });
    }

    // 隨機事件庫
    const chances = [
        { msg: "維持規律運動，獲得健保紅利 $50！", val: 50 },
        { msg: "熬夜免疫力下降，支付掛號費 $30。", val: -30 },
        { msg: "購買無農藥蔬菜，花費 $40。", val: -40 },
        { msg: "參加健康講座，獲得車馬費 $20。", val: 20 }
    ];

    // 回合管理中樞
    function processTurn() {
        renderPlayers();
        renderBoard();
        const p = players[turnIndex];

        if (p.sleep > 0) {
            log(`[${p.name}] 正在復健科休息，暫停一回合。`);
            p.sleep--;
            endTurn();
            return;
        }

        if (p.isBot) {
            btnRoll.disabled = true;
            btnRoll.innerText = "電腦行動中...";
            // 模擬 AI 思考延遲
            setTimeout(() => {
                executeMove(p);
            }, 1000);
        } else {
            btnRoll.disabled = false;
            btnRoll.innerText = "輪到你擲骰子";
        }
    }

    // 真人玩家點擊擲骰
    window.humanRoll = function() {
        btnRoll.disabled = true;
        executeMove(players[turnIndex]);
    };

    // 執行移動與判定
    function executeMove(player) {
        const dice = Math.floor(Math.random() * 6) + 1;
        log(`[${player.name}] 擲出了 ${dice} 點。`);
        
        let oldPos = player.pos;
        player.pos += dice;
        
        // 經過起點處理
        if (player.pos >= mapData.length) {
            player.pos = player.pos % mapData.length;
            player.money += 200;
            log(`[${player.name}] 經過起點，領取 $200 健康津貼。`);
        }

        renderBoard();
        const space = mapData[player.pos];
        log(`[${player.name}] 走到了「${space.name}」。`);

        // 判定踩到的格子類型
        if (space.type === 'property') {
            if (space.owner === null) {
                // 空地：AI 預設只要錢夠就買，真人則跳出提示框
                if (player.isBot) {
                    if (player.money >= space.price) {
                        buyProperty(player, space);
                    } else {
                        log(`[${player.name}] 資金不足，放棄購買。`);
                    }
                } else {
                    if (player.money >= space.price) {
                        const confirmBuy = confirm(`「${space.name}」目前無人擁有。\n價格：$${space.price}\n租金收益：$${space.rent}\n請問是否購買？`);
                        if (confirmBuy) buyProperty(player, space);
                    } else {
                        alert("資金不足以購買此設施。");
                    }
                }
            } else if (space.owner !== player.id) {
                // 別人的地：付過路費
                const rent = space.rent;
                player.money -= rent;
                players[space.owner].money += rent;
                log(`[${player.name}] 支付了 $${rent} 使用費給 ${players[space.owner].name}。`);
            }
        } 
        else if (space.type === 'chance') {
            const chance = chances[Math.floor(Math.random() * chances.length)];
            player.money += chance.val;
            log(`[${player.name}] 隨機事件：${chance.msg}`);
        }
        else if (space.type === 'tax') {
            player.money -= space.cost;
            log(`[${player.name}] 支付了醫療費用 $${space.cost}。`);
        }
        else if (space.type === 'jail') {
            player.sleep = 1;
            log(`[${player.name}] 進入復健科，下次將暫停一回合。`);
        }

        // 延遲結束回合，讓視覺有停留時間
        setTimeout(() => {
            endTurn();
        }, 800);
    }

    // 購買設施邏輯
    function buyProperty(player, space) {
        player.money -= space.price;
        space.owner = player.id;
        log(`[${player.name}] 投資了「${space.name}」。`);
    }

    // 結束回合並換人
    function endTurn() {
        // 簡單破產判定 (直接扣至負數，未做遊戲結束機制)
        if (players[turnIndex].money < 0) {
            log(`⚠️ [${players[turnIndex].name}] 資金為負，面臨破產風險！`);
        }

        turnIndex = (turnIndex + 1) % players.length;
        processTurn();
    }

    // 啟動遊戲
    processTurn();

</script>
</body>
</html>
