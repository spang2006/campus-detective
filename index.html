<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健康知識 RPG</title>
    <style>
        body {
            background-color: #222;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        #game-container {
            width: 800px;
            height: 500px;
            background-color: #333;
            border: 4px solid #fff;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        #status-bar {
            padding: 10px;
            background-color: #111;
            border-bottom: 2px solid #fff;
            display: flex;
            justify-content: space-between;
            font-size: 20px;
        }
        #scene {
            flex-grow: 1;
            position: relative;
            background: linear-gradient(to bottom, #4a6984 0%, #4a6984 60%, #5c4033 60%, #5c4033 100%);
        }
        .entity {
            position: absolute;
            bottom: 20%;
            font-size: 60px;
            transition: left 0.5s linear;
        }
        #player {
            left: 50px;
            z-index: 10;
        }
        #monster {
            right: -100px;
            display: none;
        }
        #dialog-box {
            height: 180px;
            background-color: #000;
            border-top: 2px solid #fff;
            padding: 15px;
            box-sizing: border-box;
            display: none;
            flex-direction: column;
        }
        #question-text {
            margin: 0 0 15px 0;
            font-size: 18px;
            line-height: 1.4;
        }
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        button.option-btn {
            background-color: #444;
            color: #fff;
            border: 1px solid #fff;
            padding: 10px;
            cursor: pointer;
            font-family: inherit;
            font-size: 16px;
            text-align: left;
        }
        button.option-btn:hover {
            background-color: #666;
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }
        #overlay h1 {
            font-size: 40px;
            margin-bottom: 20px;
        }
        #action-btn {
            padding: 10px 20px;
            font-size: 20px;
            background-color: #fff;
            color: #000;
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
        }
        #action-btn:hover {
            background-color: #ddd;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="status-bar">
        <span id="hp-display">HP: ❤️❤️❤️</span>
        <span id="progress-display">怪物: 0/3</span>
    </div>
    
    <div id="scene">
        <div id="player" class="entity">🧑‍⚕️</div>
        <div id="monster" class="entity">🦠</div>
    </div>
    
    <div id="dialog-box">
        <p id="question-text">題目載入中...</p>
        <div class="options-grid" id="options-container">
            </div>
    </div>

    <div id="overlay">
        <h1 id="overlay-title">健康知識 RPG</h1>
        <button id="action-btn">開始遊戲</button>
    </div>
</div>

<script>
    // 系統參數設定
    const maxHP = 3;
    let currentHP = maxHP;
    let currentMonsterIndex = 0;
    let isAnimating = false;

    // 怪物與題目資料庫
    const encounters = [
        {
            sprite: '🦠',
            question: '關於正確的洗手方式，下列何者為非？',
            options: ['使用肥皂與清水', '僅用清水沖洗3秒', '搓揉至少20秒', '確實擦乾雙手'],
            correctIndex: 1
        },
        {
            sprite: '🦇',
            question: '依據醫學建議，一般成年人每日理想的睡眠時間約為多少？',
            options: ['4至5小時', '10至12小時', '7至9小時', '少於4小時'],
            correctIndex: 2
        },
        {
            sprite: '🐉',
            question: '預防登革熱最核心且有效的環境管理措施為？',
            options: ['清除室內外積水容器', '大量噴灑化學殺蟲劑', '全天候緊閉門窗', '常規服用抗生素'],
            correctIndex: 0
        }
    ];

    // DOM 元素選取
    const hpDisplay = document.getElementById('hp-display');
    const progressDisplay = document.getElementById('progress-display');
    const playerEl = document.getElementById('player');
    const monsterEl = document.getElementById('monster');
    const dialogBox = document.getElementById('dialog-box');
    const questionText = document.getElementById('question-text');
    const optionsContainer = document.getElementById('options-container');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlay-title');
    const actionBtn = document.getElementById('action-btn');

    // 初始化/重置遊戲狀態
    function initGame() {
        currentHP = maxHP;
        currentMonsterIndex = 0;
        updateStatus();
        overlay.style.display = 'none';
        playerEl.style.left = '50px';
        spawnMonster();
    }

    // 更新狀態列
    function updateStatus() {
        hpDisplay.innerText = 'HP: ' + '❤️'.repeat(currentHP) + '🖤'.repeat(maxHP - currentHP);
        progressDisplay.innerText = `怪物: ${currentMonsterIndex}/${encounters.length}`;
    }

    // 觸發怪物生成與移動動畫
    function spawnMonster() {
        if (currentMonsterIndex >= encounters.length) {
            endGame(true);
            return;
        }

        isAnimating = true;
        dialogBox.style.display = 'none';
        
        const currentData = encounters[currentMonsterIndex];
        monsterEl.innerText = currentData.sprite;
        monsterEl.style.display = 'block';
        monsterEl.style.right = '-100px';

        // 模擬卷軸移動：怪物從右側進入畫面
        setTimeout(() => {
            monsterEl.style.right = '150px';
        }, 100);

        // 動畫結束後顯示問題
        setTimeout(() => {
            isAnimating = false;
            showQuestion(currentData);
        }, 600);
    }

    // 顯示問題與選項
    function showQuestion(data) {
        dialogBox.style.display = 'flex';
        questionText.innerText = data.question;
        optionsContainer.innerHTML = '';

        data.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = `${String.fromCharCode(65 + index)}. ${opt}`;
            btn.onclick = () => handleAnswer(index, data.correctIndex);
            optionsContainer.appendChild(btn);
        });
    }

    // 處理答案邏輯
    function handleAnswer(selectedIndex, correctIndex) {
        if (selectedIndex === correctIndex) {
            // 答對邏輯
            currentMonsterIndex++;
            updateStatus();
            dialogBox.style.display = 'none';
            monsterDefeatedAnimation();
        } else {
            // 答錯邏輯
            currentHP--;
            updateStatus();
            playerHitAnimation();
            
            if (currentHP <= 0) {
                endGame(false);
            } else {
                questionText.innerText = '答錯了！遭受攻擊扣除 1 HP。請再試一次。';
            }
        }
    }

    // 擊敗怪物動畫
    function monsterDefeatedAnimation() {
        monsterEl.style.opacity = '0';
        monsterEl.style.transform = 'scale(0.5)';
        
        setTimeout(() => {
            monsterEl.style.display = 'none';
            monsterEl.style.opacity = '1';
            monsterEl.style.transform = 'scale(1)';
            spawnMonster();
        }, 500);
    }

    // 玩家受擊動畫
    function playerHitAnimation() {
        playerEl.style.transform = 'translateX(-20px)';
        playerEl.style.color = 'red';
        setTimeout(() => {
            playerEl.style.transform = 'translateX(20px)';
        }, 100);
        setTimeout(() => {
            playerEl.style.transform = 'translateX(0)';
            playerEl.style.color = 'inherit';
        }, 200);
    }

    // 結算遊戲結果
    function endGame(isVictory) {
        dialogBox.style.display = 'none';
        overlay.style.display = 'flex';
        
        if (isVictory) {
            overlayTitle.innerText = '探險成功！';
            overlayTitle.style.color = '#4CAF50';
            actionBtn.innerText = '重新開始';
        } else {
            overlayTitle.innerText = 'HP 歸零，探險失敗';
            overlayTitle.style.color = '#F44336';
            actionBtn.innerText = '重新挑戰';
        }
        
        actionBtn.onclick = initGame;
    }

    // 綁定初始按鈕事件
    actionBtn.onclick = initGame;

</script>
</body>
</html>
