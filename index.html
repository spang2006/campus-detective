<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健康知識 RPG</title>
    <style>
        body {
            background-color: #222;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; /* 防止視窗出現捲軸 */
        }
        #game-container {
            width: 800px;
            height: 500px;
            background-color: #333;
            border: 4px solid #fff;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        #status-bar {
            padding: 10px;
            background-color: #111;
            border-bottom: 2px solid #fff;
            display: flex;
            justify-content: space-between;
            font-size: 20px;
            z-index: 30;
        }
        #scene {
            flex-grow: 1;
            position: relative;
            /* 天空背景：利用重複的放射漸層模擬雲朵 */
            background-color: #4a6984;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255,255,255,0.2) 20px, transparent 21px),
                radial-gradient(circle at 70% 40%, rgba(255,255,255,0.15) 30px, transparent 31px);
            background-size: 300px 100%;
        }
        #ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 25%;
            /* 地面背景：利用重複線性漸層製造移動參考線 */
            background-image: repeating-linear-gradient(90deg, #5c4033, #5c4033 40px, #4a3329 40px, #4a3329 80px);
            border-top: 4px solid #3b2818;
        }
        .entity {
            position: absolute;
            bottom: 25%;
            font-size: 60px;
            user-select: none;
        }
        #player {
            left: 50px;
            z-index: 10;
            transition: transform 0.1s; /* 用於轉向 */
        }
        #monster {
            right: 150px;
            display: none;
            z-index: 5;
        }
        #ui-layer {
            position: absolute;
            top: 50px; /* 避開狀態列 */
            width: 100%;
            text-align: center;
            pointer-events: none;
            font-weight: bold;
            color: rgba(255,255,255,0.7);
        }
        #dialog-box {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 180px;
            background-color: rgba(0, 0, 0, 0.9);
            border-top: 2px solid #fff;
            padding: 15px;
            box-sizing: border-box;
            display: none;
            flex-direction: column;
            z-index: 40;
        }
        #question-text {
            margin: 0 0 15px 0;
            font-size: 18px;
            line-height: 1.4;
        }
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        button.option-btn {
            background-color: #444;
            color: #fff;
            border: 1px solid #fff;
            padding: 10px;
            cursor: pointer;
            font-family: inherit;
            font-size: 16px;
            text-align: left;
        }
        button.option-btn:hover {
            background-color: #666;
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 50;
        }
        #overlay h1 {
            font-size: 40px;
            margin-bottom: 20px;
        }
        #action-btn {
            padding: 10px 20px;
            font-size: 20px;
            background-color: #fff;
            color: #000;
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
        }
        #action-btn:hover {
            background-color: #ddd;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="status-bar">
        <span id="hp-display">HP: ❤️❤️❤️</span>
        <span id="progress-display">怪物: 0/3</span>
    </div>
    
    <div id="scene">
        <div id="ground"></div>
        <div id="ui-layer" id="instruction">請使用鍵盤 [←] [→] 移動</div>
        <div id="player" class="entity">🧑‍⚕️</div>
        <div id="monster" class="entity">🦠</div>
    </div>
    
    <div id="dialog-box">
        <p id="question-text">題目載入中...</p>
        <div class="options-grid" id="options-container"></div>
    </div>

    <div id="overlay">
        <h1 id="overlay-title">健康知識 RPG</h1>
        <button id="action-btn">開始遊戲</button>
    </div>
</div>

<script>
    // 遊戲參數
    const maxHP = 3;
    let currentHP = maxHP;
    let currentMonsterIndex = 0;
    
    // 物理與位移參數
    let gameState = 'title'; // 'title', 'explore', 'combat', 'gameover'
    let playerX = 50;
    let mapScrollX = 0;
    let speed = 5;
    let distanceToNextEncounter = 400; // 距離下次遭遇怪物的距離
    
    // 鍵盤狀態
    const keys = { ArrowLeft: false, ArrowRight: false };

    // 怪物與題目資料庫
    const encounters = [
        {
            sprite: '🦠',
            question: '關於正確的洗手方式，下列何者為非？',
            options: ['使用肥皂與清水', '僅用清水沖洗3秒', '搓揉至少20秒', '確實擦乾雙手'],
            correctIndex: 1
        },
        {
            sprite: '🦇',
            question: '依據醫學建議，一般成年人每日理想的睡眠時間約為多少？',
            options: ['4至5小時', '10至12小時', '7至9小時', '少於4小時'],
            correctIndex: 2
        },
        {
            sprite: '🐉',
            question: '預防登革熱最核心且有效的環境管理措施為？',
            options: ['清除室內外積水容器', '大量噴灑化學殺蟲劑', '全天候緊閉門窗', '常規服用抗生素'],
            correctIndex: 0
        }
    ];

    // DOM 元素選取
    const hpDisplay = document.getElementById('hp-display');
    const progressDisplay = document.getElementById('progress-display');
    const sceneEl = document.getElementById('scene');
    const groundEl = document.getElementById('ground');
    const playerEl = document.getElementById('player');
    const monsterEl = document.getElementById('monster');
    const dialogBox = document.getElementById('dialog-box');
    const questionText = document.getElementById('question-text');
    const optionsContainer = document.getElementById('options-container');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlay-title');
    const actionBtn = document.getElementById('action-btn');

    // 監聽鍵盤事件
    window.addEventListener('keydown', (e) => {
        if (keys.hasOwnProperty(e.code)) keys[e.code] = true;
    });
    window.addEventListener('keyup', (e) => {
        if (keys.hasOwnProperty(e.code)) keys[e.code] = false;
    });

    // 初始化/重置遊戲
    function initGame() {
        currentHP = maxHP;
        currentMonsterIndex = 0;
        playerX = 50;
        mapScrollX = 0;
        distanceToNextEncounter = 400;
        gameState = 'explore';
        
        updateStatus();
        overlay.style.display = 'none';
        dialogBox.style.display = 'none';
        monsterEl.style.display = 'none';
        
        // 重置按鍵狀態以防卡鍵
        keys.ArrowLeft = false;
        keys.ArrowRight = false;
        
        requestAnimationFrame(gameLoop);
    }

    function updateStatus() {
        hpDisplay.innerText = 'HP: ' + '❤️'.repeat(currentHP) + '🖤'.repeat(maxHP - currentHP);
        progressDisplay.innerText = `怪物: ${currentMonsterIndex}/${encounters.length}`;
    }

    // 主遊戲迴圈
    function gameLoop() {
        if (gameState === 'explore') {
            handleMovement();
            updateVisuals();
            checkEncounter();
        }
        
        if (gameState !== 'gameover' && gameState !== 'title') {
            requestAnimationFrame(gameLoop);
        }
    }

    // 處理移動邏輯
    function handleMovement() {
        if (keys.ArrowRight) {
            playerEl.style.transform = 'scaleX(1)'; // 面向右
            // 若玩家還沒到畫面中間，則移動玩家；否則捲動背景
            if (playerX < 350) {
                playerX += speed;
            } else {
                mapScrollX -= speed;
                distanceToNextEncounter -= speed;
            }
        }
        
        if (keys.ArrowLeft) {
            playerEl.style.transform = 'scaleX(-1)'; // 面向左
            // 防止玩家走出畫面左側界線
            if (playerX > 10) {
                playerX -= speed;
            } else if (mapScrollX < 0) { // 允許往回捲動背景
                mapScrollX += speed;
                distanceToNextEncounter += speed;
            }
        }
    }

    // 更新畫面渲染
    function updateVisuals() {
        playerEl.style.left = playerX + 'px';
        // 視差滾動：天空移動較慢，地面移動較快
        sceneEl.style.backgroundPositionX = (mapScrollX * 0.3) + 'px';
        groundEl.style.backgroundPositionX = mapScrollX + 'px';
    }

    // 檢查是否遭遇怪物
    function checkEncounter() {
        if (distanceToNextEncounter <= 0 && currentMonsterIndex < encounters.length) {
            triggerCombat();
        } else if (currentMonsterIndex >= encounters.length) {
            endGame(true);
        }
    }

    // 觸發戰鬥
    function triggerCombat() {
        gameState = 'combat';
        keys.ArrowLeft = false;
        keys.ArrowRight = false;
        
        const currentData = encounters[currentMonsterIndex];
        monsterEl.innerText = currentData.sprite;
        monsterEl.style.display = 'block';
        monsterEl.style.opacity = '1';
        
        // 顯示對話框
        setTimeout(() => {
            dialogBox.style.display = 'flex';
            questionText.innerText = currentData.question;
            optionsContainer.innerHTML = '';

            currentData.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = `${String.fromCharCode(65 + index)}. ${opt}`;
                btn.onclick = () => handleAnswer(index, currentData.correctIndex);
                optionsContainer.appendChild(btn);
            });
        }, 300);
    }

    // 處理答題邏輯
    function handleAnswer(selectedIndex, correctIndex) {
        if (selectedIndex === correctIndex) {
            // 答對
            currentMonsterIndex++;
            updateStatus();
            dialogBox.style.display = 'none';
            
            // 怪物消失動畫
            monsterEl.style.transition = 'opacity 0.5s';
            monsterEl.style.opacity = '0';
            
            setTimeout(() => {
                monsterEl.style.display = 'none';
                monsterEl.style.transition = ''; // 重置
                distanceToNextEncounter = Math.floor(Math.random() * 200) + 300; // 隨機設定下一隻怪物的距離
                gameState = 'explore';
            }, 500);
            
        } else {
            // 答錯
            currentHP--;
            updateStatus();
            
            // 玩家受擊動畫
            playerEl.style.transform = `${playerEl.style.transform.includes('-1') ? 'scaleX(-1)' : 'scaleX(1)'} translateX(-20px)`;
            playerEl.style.color = 'red';
            
            setTimeout(() => {
                playerEl.style.transform = playerEl.style.transform.replace(' translateX(-20px)', '');
                playerEl.style.color = 'inherit';
            }, 200);

            if (currentHP <= 0) {
                endGame(false);
            } else {
                questionText.innerText = '答錯了！遭受攻擊扣除 1 HP。請再試一次。';
            }
        }
    }

    // 遊戲結束結算
    function endGame(isVictory) {
        gameState = 'gameover';
        dialogBox.style.display = 'none';
        overlay.style.display = 'flex';
        
        if (isVictory) {
            overlayTitle.innerText = '探險成功！';
            overlayTitle.style.color = '#4CAF50';
            actionBtn.innerText = '重新開始';
        } else {
            overlayTitle.innerText = 'HP 歸零，探險失敗';
            overlayTitle.style.color = '#F44336';
            actionBtn.innerText = '重新挑戰';
        }
    }

    // 綁定初始按鈕
    actionBtn.onclick = initGame;

</script>
</body>
</html>
